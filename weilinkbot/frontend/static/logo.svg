<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="50%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="35%" r="55%">
      <stop offset="0%" stop-color="#BFDBFE" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#3B82F6" stop-opacity="0"/>
    </radialGradient>
    <filter id="iconShadow" x="-8%" y="-8%" width="116%" height="124%">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#1E1B4B" flood-opacity="0.3"/>
    </filter>
    <filter id="wGlow" x="-12%" y="-12%" width="124%" height="124%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4" result="blur"/>
      <feFlood flood-color="#FFFFFF" flood-opacity="0.3" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect x="16" y="16" width="480" height="480" rx="96" ry="96"
        fill="url(#bgGrad)" filter="url(#iconShadow)"/>
  <!-- Light overlay for depth -->
  <rect x="16" y="16" width="480" height="480" rx="96" ry="96"
        fill="url(#glow)"/>
  <!-- Subtle inner border highlight -->
  <rect x="20" y="20" width="472" height="472" rx="92" ry="92"
        fill="none" stroke="#FFFFFF" stroke-opacity="0.12" stroke-width="2"/>

  <!-- W letter — bold geometric filled polygon -->
  <g transform="translate(256, 248)" filter="url(#wGlow)">
    <path d="
      M -144,-100
      L -96, 100
      L -48,-16
      L   0, 100
      L  48,-16
      L  96, 100
      L 144,-100
      L  82,-100
      L  48,  24
      L   0,-52
      L -48,  24
      L -82,-100
      Z
    " fill="#FFFFFF"/>
  </g>

  <!-- Chat bubble — bottom-right -->
  <g transform="translate(408, 408)">
    <rect x="-50" y="-34" width="100" height="68" rx="16" ry="16"
          fill="#FFFFFF" fill-opacity="0.92"/>
    <polygon points="-36,34 -18,34 -28,50" fill="#FFFFFF" fill-opacity="0.92"/>
    <!-- Three animated-looking dots -->
    <circle cx="-22" cy="0" r="6" fill="#6366F1"/>
    <circle cx="0"  cy="0" r="6" fill="#818CF8"/>
    <circle cx="22" cy="0" r="6" fill="#A78BFA"/>
  </g>

  <!-- AI sparkle — top-right corner -->
  <g transform="translate(408, 104)" fill="none" stroke="#FFFFFF" stroke-linecap="round">
    <line x1="0" y1="-16" x2="0" y2="16" stroke-width="3.2" stroke-opacity="0.88"/>
    <line x1="-16" y1="0" x2="16" y2="0" stroke-width="3.2" stroke-opacity="0.88"/>
    <line x1="-11" y1="-11" x2="11" y2="11" stroke-width="2.6" stroke-opacity="0.72"/>
    <line x1="11" y1="-11" x2="-11" y2="11" stroke-width="2.6" stroke-opacity="0.72"/>
  </g>
</svg>
